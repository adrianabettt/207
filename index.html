<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio dos Classificadores</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde: #22C55E;
            --verde-escuro: #15803D;
            --bg: #F0FDF4;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Garante que não haja scroll */
        }

        header {
            background: var(--verde-escuro);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-family: 'Fredoka One', cursive; font-size: 1.2rem; }

        .fase-info { font-weight: 800; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 20px; }

        main {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: calc(100vh - 80px);
        }

        .instrucao {
            background: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #BBF7D0;
            font-family: 'Fredoka One', cursive;
            font-size: 1.4rem;
            color: #1F2937;
        }

        .jogo-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        /* Lado Esquerdo: Itens */
        .caixa-itens {
            background: white;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #E5E7EB;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }

        .item {
            background: #F9FAFB;
            border: 2px solid #D1D5DB;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: grab;
            user-select: none;
            transition: 0.2s;
        }

        .item:active { cursor: grabbing; transform: scale(1.1); }

        /* Lado Direito: Zonas */
        .zonas-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .zona {
            flex: 1;
            border: 3px dashed #CBD5E1;
            border-radius: 15px;
            background: rgba(255,255,255,0.5);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 10px;
            position: relative;
            align-content: flex-start;
        }

        .zona::before {
            content: attr(data-label);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2;
            font-weight: 900;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .zona.drag-over { border-color: var(--verde); background: #DCFCE7; }

        .zona .item { width: 50px; height: 50px; font-size: 1.5rem; }

        .btn-conferir {
            background: var(--verde-escuro);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #064E3B;
        }

        .btn-conferir:active { transform: translateY(3px); box-shadow: none; }

        /* Modal Simples */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }

        .modal-box {
            background: white; padding: 30px; border-radius: 25px; text-align: center;
            max-width: 400px; width: 90%;
        }

        .modal-box h2 { font-family: 'Fredoka One', cursive; margin-bottom: 15px; }

        footer {
            background: #E8F5E9;
            text-align: center;
            padding: 5px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #666;
            border-top: 2px solid #BBF7D0;
        }
    </style>
</head>
<body>

<header>
    <h1>🔍 Os Classificadores</h1>
    <div class="fase-info" id="txt-fase">Fase 1 de 5</div>
</header>

<main>
    <div class="instrucao" id="pergunta">Classifique os que: RODAS</div>

    <div class="jogo-container">
        <div class="caixa-itens" id="origem"></div>

        <div class="zonas-container">
            <div class="zona" id="box-sim" data-label="PERTENCE ✅"></div>
            <div class="zona" id="box-nao" data-label="NÃO PERTENCE ❌"></div>
            <button class="btn-conferir" onclick="validarFase()">FINALIZAR FASE</button>
        </div>
    </div>
</main>

<div id="modal">
    <div class="modal-box">
        <h2 id="modal-titulo">Resultado</h2>
        <p id="modal-msg" style="margin-bottom: 20px; font-weight: bold;"></p>
        <button class="btn-conferir" id="btn-modal" onclick="proximaFase()">PRÓXIMO</button>
    </div>
</div>

<footer>Material Pedagógico - Profª Adriana Bett Terebinto © 2026</footer>

<script>
    const veiculos = [
        { e: "🚗", tags: ["MOTOR", "RODAS"] }, { e: "🚲", tags: ["RODAS"] },
        { e: "✈️", tags: ["VOAR", "MOTOR"] }, { e: "⛵", tags: ["AGUA"] },
        { e: "🚤", tags: ["AGUA", "MOTOR"] }, { e: "🚁", tags: ["VOAR", "MOTOR"] },
        { e: "🚂", tags: ["RODAS", "MOTOR"] }, { e: "🚜", tags: ["RODAS", "MOTOR"] }
    ];

    const desafios = [
        { txt: "POSSUEM RODAS", tag: "RODAS" },
        { txt: "TÊM MOTOR", tag: "MOTOR" },
        { txt: "ANDAM NA ÁGUA", tag: "AGUA" },
        { txt: "CONSEGUEM VOAR", tag: "VOAR" },
        { txt: "SÃO TERRESTRES", tag: "RODAS" }
    ];

    let faseAtual = 0;
    let acertosTotais = 0;
    let draggingItem = null;

    function iniciarJogo() {
        if (faseAtual >= desafios.length) {
            mostrarFinal();
            return;
        }

        const d = desafios[faseAtual];
        document.getElementById('txt-fase').textContent = `Fase ${faseAtual + 1} de 5`;
        document.getElementById('pergunta').textContent = d.txt;
        document.getElementById('box-sim').innerHTML = '';
        document.getElementById('box-nao').innerHTML = '';
        
        const origem = document.getElementById('origem');
        origem.innerHTML = '';

        // Mistura e seleciona itens
        const itensSorteados = [...veiculos].sort(() => Math.random() - 0.5);
        itensSorteados.forEach(v => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = v.e;
            div.draggable = true;
            div.dataset.tags = v.tags.join(',');
            
            div.addEventListener('dragstart', () => { draggingItem = div; });
            origem.appendChild(div);
        });
    }

    // Lógica de Drag and Drop
    document.querySelectorAll('.zona, .caixa-itens').forEach(zona => {
        zona.addEventListener('dragover', e => { e.preventDefault(); zona.classList.add('drag-over'); });
        zona.addEventListener('dragleave', () => zona.classList.remove('drag-over'));
        zona.addEventListener('drop', () => {
            zona.classList.remove('drag-over');
            zona.appendChild(draggingItem);
        });
    });

    function validarFase() {
        const d = desafios[faseAtual];
        const itensSim = document.getElementById('box-sim').querySelectorAll('.item');
        const itensNao = document.getElementById('box-nao').querySelectorAll('.item');
        const restantes = document.getElementById('origem').querySelectorAll('.item').length;

        if (restantes > 0) {
            alert("Classifique todos os veículos antes de finalizar!");
            return;
        }

        let erros = 0;
        itensSim.forEach(i => { if (!i.dataset.tags.includes(d.tag)) erros++; });
        itensNao.forEach(i => { if (i.dataset.tags.includes(d.tag)) erros++; });

        if (erros === 0) {
            acertosTotais += 2; // 2 pontos por fase perfeita
            exibirModal("🌟 Parabéns!", "Você classificou tudo corretamente!");
        } else {
            exibirModal("Keep Going!", `Você cometeu ${erros} erro(s). Vamos para a próxima!`);
        }
    }

    function exibirModal(titulo, msg) {
        document.getElementById('modal-titulo').textContent = titulo;
        document.getElementById('modal-msg').textContent = msg;
        document.getElementById('modal').style.display = 'flex';
    }

    function proximaFase() {
        document.getElementById('modal').style.display = 'none';
        faseAtual++;
        iniciarJogo();
    }

    function mostrarFinal() {
        const nota = acertosTotais.toFixed(1).replace('.', ',');
        document.body.innerHTML = `
            <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--verde-escuro); color:white; font-family:'Fredoka One';">
                <h1 style="font-size:3rem">🏆 FIM DE JOGO!</h1>
                <p style="font-size:1.5rem">Sua nota final foi:</p>
                <div style="font-size:8rem">${nota}</div>
                <button onclick="location.reload()" style="padding:15px 30px; border-radius:15px; border:none; cursor:pointer; font-family:'Fredoka One'; font-size:1.2rem">RECOMEÇAR</button>
                <p style="margin-top:40px; font-size:0.8rem">Material Pedagógico - Profª Adriana Bett Terebinto © 2026</p>
            </div>
        `;
    }

    iniciarJogo();
</script>

</body>
</html>
